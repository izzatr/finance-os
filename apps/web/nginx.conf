server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── API, auth, MCP: same-origin proxy to the api service ────────────────
    # X-Forwarded-For is APPENDED at each trusted hop; the api extracts the
    # client IP using TRUST_PROXY_HOPS (number of trusted appenders).

    location /api/ {
        proxy_pass http://api:27032/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # the assistant streams SSE — don't buffer it
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /auth/ {
        proxy_pass http://api:27032/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp {
        proxy_pass http://api:27032/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location = /openapi.json {
        proxy_pass http://api:27032/openapi.json;
        proxy_set_header Host $host;
    }

    location = /health {
        proxy_pass http://api:27032/health;
        proxy_set_header Host $host;
    }

    # ── Security headers for the SPA ─────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
